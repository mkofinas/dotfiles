# Global Ruff config — replicating flake8 + pylint coverage.
# Project-level pyproject.toml / ruff.toml overrides this entirely.

line-length = 88
target-version = "py311"

[lint]
select = [
    # --- flake8 core (flake8 = pycodestyle + pyflakes + mccabe) ---
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "C90",   # mccabe complexity

    # --- pylint-equivalent categories ---
    "PL",    # all pylint rules ruff has ported (PLC/PLE/PLR/PLW)

    # --- extras pylint-style checking implies ---
    "N",     # pep8-naming (pylint's naming-convention checks)
    "B",     # flake8-bugbear (overlaps pylint's bug-likely warnings)
    "RUF",   # ruff-specific
]

ignore = [
    "E501",  # line length — formatter handles wrapping
    "E203",  # whitespace before ':', conflicts with black
]

[lint.mccabe]
max-complexity = 10

[format]
quote-style = "double"
